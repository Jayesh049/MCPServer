# Minimal Render Blueprint — backend only (Dockerfile).
# Dashboard: New → Blueprint → connect repo → select this file OR copy service block.
# Frontend: deploy separately on Vercel (root: frontend/) — see deploy/vercel-env.template.txt

services:
  - type: web
    name: mcp-server
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MCP_TRANSPORT
        value: http
      - key: PORT
        value: "3333"
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: HF_API_TOKEN
        sync: false
